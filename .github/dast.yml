name: DAST - OWASP ZAP Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dast:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Set up Python (adjust if Node/Java etc.)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3. Install your app's dependencies
      - name: Install Dependencies
        run: pip install -r requirements.txt

      # 4. Start your app in the background
      - name: Start Flask App
        run: |
          python app.py &
          sleep 5  # wait for app to boot

      # 5. Run OWASP ZAP Baseline Scan
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost:5000'
          rules_file_name: '.zap/rules.tsv'   # optional: suppress false positives
          fail_action: false                   # set true to fail build on alerts

      # 6. Upload the ZAP report as artifact
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v3
        with:
          name: zap-report
          path: report_html.html
