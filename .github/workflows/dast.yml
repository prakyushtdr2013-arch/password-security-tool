name: DAST - OWASP ZAP Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Start Flask App
        run: |
          python web.py > flask.log 2>&1 &
          sleep 15

      # ✅ This will show us WHY flask failed
      - name: Show Flask Logs
        run: cat flask.log

      # ✅ This confirms if port is open
      - name: Check Port 5000
        run: |
          curl -v http://localhost:5000 || true
          ss -tlnp | grep 5000 || echo "Port 5000 not open!"

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost:5000'
          fail_action: false
          allow_issue_writing: false

      - name: Upload Flask Log
        uses: actions/upload-artifact@v4
        with:
          name: flask-log
          path: flask.log

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html
