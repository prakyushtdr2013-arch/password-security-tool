name: DAST - OWASP ZAP Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Start Flask App
        run: |
          python -m src.password_security_tool.web > flask.log 2>&1 &
          sleep 5
          # Wait for Flask to be ready
          for i in {1..30}; do
            if curl -s http://localhost:5000 > /dev/null 2>&1; then
              echo "Flask is running!"
              exit 0
            fi
            echo "Attempt $i: Waiting for Flask to start..."
            sleep 1
          done
          echo "Flask failed to start!"
          cat flask.log
          exit 1
          
      # ✅ This will show us WHY flask failed
      - name: Show Flask Logs
        if: always()
        run: |
          echo "=== Flask Logs ===" && cat flask.log
          echo ""
          echo "=== Running Processes ===" && ps aux | grep -E "python|flask"

      # ✅ This confirms if port is open
      - name: Check Port 5000
        run: |
          echo "Testing curl..."
          curl -v http://localhost:5000 || true
          echo ""
          echo "Checking open ports..."
          ss -tlnp | grep 5000 || echo "Port 5000 not open!"
          echo ""
          echo "All listening ports:"
          ss -tlnp

      - name: Create ZAP output directory
        run: mkdir -p /tmp/zap-output && chmod 777 /tmp/zap-output

      - name: ZAP Baseline Scan
        run: |
          docker run \
            -v /tmp/zap-output:/zap/wrk:rw \
            --network=host \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:5000 -r /zap/wrk/report_html.html || true

      - name: Upload Flask Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flask-log
          path: flask.log
          if-no-files-found: ignore

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: /tmp/zap-output/report_html.html
          if-no-files-found: ignore
