name: DAST - OWASP ZAP Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Start Flask App
        run: |
          python -m src.password_security_tool.web > flask.log 2>&1 &
          sleep 20
          
      # ✅ This will show us WHY flask failed
      - name: Show Flask Logs
        if: always()
        run: |
          echo "=== Flask Logs ===" && cat flask.log
          echo ""
          echo "=== Running Processes ===" && ps aux | grep -E "python|flask"

      # ✅ This confirms if port is open
      - name: Check Port 5000
        run: |
          echo "Testing curl..."
          curl -v http://localhost:5000 || true
          echo ""
          echo "Checking open ports..."
          ss -tlnp | grep 5000 || echo "Port 5000 not open!"
          echo ""
          echo "All listening ports:"
          ss -tlnp

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost:5000'
          fail_action: false
          allow_issue_writing: false

      - name: Upload Flask Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flask-log
          path: flask.log
          if-no-files-found: ignore

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html
          if-no-files-found: ignore
