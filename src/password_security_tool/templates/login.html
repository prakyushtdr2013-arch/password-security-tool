{% extends 'base.html' %}

{% block title %}Login | PassGuard{% endblock %}

{% block content %}
  <section class="hero-card auth-card">
    <div class="hero-copy">
      <h1>Welcome back.</h1>
      <p>Log in to manage your passwords, analyze strength, and generate secure credentials.</p>
    </div>
    <form class="auth-form" method="post" action="{{ url_for('login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
      <label>Username</label>
      <input type="text" name="username" placeholder="username" required />
      <label>Password</label>
      <div class="password-row">
        <input class="password-input" type="password" name="password" placeholder="password" required />
        <button type="button" class="show-password-toggle" aria-label="Show password" title="Show password">
          <span class="eye-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
          </span>
          <span class="eye-slash-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 12c1.67 4.7 5.4 7.5 9.5 7.5 1.5 0 2.88-.3 4.12-.85"/><path d="M9.88 9.88a3.75 3.75 0 014.24 4.24"/><path d="M1 1l22 22"/><path d="M21.5 12c-1.67 4.7-5.4 7.5-9.5 7.5-1.5 0-2.88-.3-4.12-.85"/></svg>
          </span>
        </button>
      </div>
      <button type="submit">Login</button>
      <p class="form-foot">New here? <a href="{{ url_for('signup') }}">Create an account</a>.</p>
    </form>
  </section>
{% endblock %}
