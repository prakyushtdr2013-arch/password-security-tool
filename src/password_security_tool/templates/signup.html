{% extends 'base.html' %}

{% block title %}Sign Up | PassGuard{% endblock %}

{% block content %}
  <section class="hero-card auth-card">
    <div class="hero-copy">
      <h1>Create your secure account.</h1>
      <p>Sign up to access the password analyzer, breach checks, and generator on localhost.</p>
    </div>
    <form class="auth-form" method="post" action="{{ url_for('signup') }}">
      <label>Username</label>
      <input type="text" name="username" placeholder="username" required />
      <label>Email</label>
      <input type="email" name="email" placeholder="you@example.com" required />
      <label>Password</label>
      <input type="password" name="password" placeholder="password" required />
      <button type="submit">Sign Up</button>
      <p class="form-foot">Already have an account? <a href="{{ url_for('login') }}">Log in</a>.</p>
    </form>
  </section>
{% endblock %}
