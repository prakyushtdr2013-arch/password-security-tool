{% extends 'base.html' %}

{% block title %}Verify Login | PassGuard{% endblock %}

{% block content %}
  <section class="hero-card auth-card">
    <div class="hero-copy">
      <h1>Check your email.</h1>
      <p>Enter the six-digit verification code sent for {{ username }}.</p>
    </div>
    <form class="auth-form" method="post" action="{{ url_for('verify_otp') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
      <label>Verification code</label>
      <input type="text" name="otp" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="000000" required />
      <button type="submit">Verify</button>
    </form>
  </section>
{% endblock %}
