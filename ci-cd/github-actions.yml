name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: pip install -e .
      - run: pytest -q

  sast:
    name: SAST Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: pip install bandit semgrep pip-audit
      - run: bandit -r src/password_security_tool -lll
      - run: semgrep --config=p/python-security --timeout 120 src/password_security_tool
      - run: python -m pip_audit

  sonarcloud:
    name: SonarCloud Analysis
    if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_ORGANIZATION != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: pip install -e .
      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@v1.12.0
        with:
          organization: prakyushtdr2013-arch
          token: 6adf455c0f98375b0d436cfed50fb67873d8184f
          projectKey: password-security-tool
          projectName: Password Security Tool

  dast:
    name: DAST Scan (OWASP ZAP)
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: pip install -e .
      - name: Start Flask app for scanning
        run: |
          python -m password_security_tool.web &
          echo "Waiting for app startup"
          sleep 10
      - name: Run OWASP ZAP baseline scan
        run: |
          docker pull owasp/zap2docker-stable
          docker run --rm --network host owasp/zap2docker-stable zap-baseline.py -t http://127.0.0.1:5000 -r zap-report.html
      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-report.html
